name: build-irods-ubuntu
on: [push, pull_request]
jobs:
  build:
    name: ${{ matrix.container }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      matrix:
        container: ['ubuntu:20.04','ubuntu:22.04','ubuntu:24.04']
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      - name: Install Prerequisites
        run:  |
              apt-get update -qq
              apt-get install -qq dnsutils apt-transport-https ca-certificates
              apt-get install -qq build-essential wget curl gnupg g++ make python3-dev unixodbc libcurl4-gnutls-dev libbz2-dev zlib1g-dev libpam0g-dev libssl-dev libxml2-dev unixodbc-dev python3-psutil odbc-postgresql libkrb5-dev python3-distro flex bison libarchive-dev ninja-build
      - name: Install iRODS Externals
        run:  |
              mkdir -p /etc/apt/keyrings
              wget -qO - https://unstable.irods.org/irods-unstable-signing-key.asc | \
                gpg \
                  --no-options \
                  --no-default-keyring \
                  --no-auto-check-trustdb \
                  --homedir /dev/null \
                  --no-keyring \
                  --import-options import-export \
                  --output /etc/apt/keyrings/renci-irods-unstable-archive-keyring.pgp \
                  --import
              echo "deb [signed-by=/etc/apt/keyrings/renci-irods-unstable-archive-keyring.pgp arch=amd64] https://unstable.irods.org/apt/ $(lsb_release -sc) main" | \
                tee /etc/apt/sources.list.d/renci-irods-unstable.list
              apt-get update -qq
              apt-get install -qq \
                irods-externals-avro-libcxx1.11.0-3 \
                irods-externals-boost-libcxx1.81.0-1 \
                irods-externals-catch22.13.8-0 \
                irods-externals-clang-runtime13.0.1-0 \
                irods-externals-clang13.0.1-0 \
                irods-externals-cmake3.21.4-0 \
                irods-externals-cppzmq4.8.1-1 \
                irods-externals-fmt-libcxx8.1.1-1 \
                irods-externals-json3.10.4-0 \
                irods-externals-nanodbc-libcxx2.13.0-2 \
                irods-externals-spdlog-libcxx1.9.2-2 \
                irods-externals-zeromq4-1-libcxx4.1.8-1
      - name: Configure Ccache
        run:  |
              apt-get install -qq ccache
              echo "CCACHE_DIR=/irods_build_cache" >> $GITHUB_ENV
              echo "CCACHE_MAXSIZE=1G" >> $GITHUB_ENV
      - name: Restore Ccache State
        uses: actions/cache@v4
        with:
              key: "ccache-irods-43s-${{ matrix.container }}"
              path: /irods_build_cache/
      - name: Configure CMake
        run:  |
              export PATH=/opt/irods-externals/cmake3.21.4-0/bin:$PATH
              mkdir build
              cd build
              cmake \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DIRODS_DISABLE_COMPILER_OPTIMIZATIONS=ON \
                -DIRODS_ENABLE_ALL_TESTS=YES \
                -GNinja \
                ../
      - name: Build and Package
        run:  |
              cd build
              ninja package
